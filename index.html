<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>계산기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+KR:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a222d;
      --key: #2a3544;
      --key-hover: #354256;
      --key-active: #1e2733;
      --accent: #3d9cf5;
      --accent-hover: #5aadff;
      --accent-active: #2b8ae0;
      --danger: #e85d5d;
      --danger-hover: #f07070;
      --text: #e8eef5;
      --muted: #8b9cb3;
      --radius: 14px;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: "Noto Sans KR", system-ui, sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #1a3048 0%, var(--bg) 55%);
      color: var(--text);
    }

    .calc {
      width: min(100%, 360px);
      background: var(--panel);
      border-radius: calc(var(--radius) + 6px);
      padding: 20px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .display-wrap {
      margin-bottom: 18px;
      padding: 16px 18px;
      background: rgba(0, 0, 0, 0.25);
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.05);
      min-height: 96px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      gap: 6px;
    }

    .expression {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.85rem;
      color: var(--muted);
      min-height: 1.2em;
      word-break: break-all;
      text-align: right;
      width: 100%;
    }

    .result {
      font-family: "JetBrains Mono", monospace;
      font-size: 2.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      word-break: break-all;
      text-align: right;
      width: 100%;
      line-height: 1.15;
    }

    .keys {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      font-family: inherit;
      font-size: 1.15rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      padding: 18px 8px;
      cursor: pointer;
      color: var(--text);
      background: var(--key);
      transition: background 0.12s ease, transform 0.08s ease;
      -webkit-tap-highlight-color: transparent;
    }

    button:hover {
      background: var(--key-hover);
    }

    button:active {
      transform: scale(0.97);
      background: var(--key-active);
    }

    button.span-2 {
      grid-column: span 2;
    }

    button.accent {
      background: var(--accent);
      color: #fff;
    }

    button.accent:hover {
      background: var(--accent-hover);
    }

    button.accent:active {
      background: var(--accent-active);
    }

    button.danger {
      background: rgba(232, 93, 93, 0.2);
      color: var(--danger);
    }

    button.danger:hover {
      background: rgba(232, 93, 93, 0.35);
      color: var(--danger-hover);
    }

    .hint {
      margin-top: 14px;
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="calc" role="application" aria-label="계산기">
    <div class="display-wrap">
      <div class="expression" id="expr" aria-live="polite"></div>
      <div class="result" id="display" aria-live="assertive">0</div>
    </div>
    <div class="keys">
      <button type="button" class="danger" data-action="clear">AC</button>
      <button type="button" data-action="sign">±</button>
      <button type="button" data-action="percent">%</button>
      <button type="button" class="accent" data-op="/">÷</button>

      <button type="button" data-digit="7">7</button>
      <button type="button" data-digit="8">8</button>
      <button type="button" data-digit="9">9</button>
      <button type="button" class="accent" data-op="*">×</button>

      <button type="button" data-digit="4">4</button>
      <button type="button" data-digit="5">5</button>
      <button type="button" data-digit="6">6</button>
      <button type="button" class="accent" data-op="-">−</button>

      <button type="button" data-digit="1">1</button>
      <button type="button" data-digit="2">2</button>
      <button type="button" data-digit="3">3</button>
      <button type="button" class="accent" data-op="+">+</button>

      <button type="button" class="span-2" data-digit="0">0</button>
      <button type="button" data-action="dot">.</button>
      <button type="button" class="accent" data-action="equals">=</button>
    </div>
    <p class="hint">키보드: 숫자 · 연산 · Enter(=) · Esc(AC) · Backspace</p>
  </div>

  <script>
    (function () {
      const display = document.getElementById("display");
      const exprEl = document.getElementById("expr");

      let displayStr = "0";
      let stored = null;
      let pendingOp = null;
      let fresh = true;

      const opSymbols = { "+": "+", "-": "−", "*": "×", "/": "÷" };

      function formatNum(n) {
        if (!Number.isFinite(n)) return "오류";
        const s = String(n);
        if (s.length > 12) {
          const exp = n.toExponential(6);
          return exp.length > 12 ? n.toExponential(4) : exp;
        }
        return s;
      }

      function parseDisplay() {
        const v = parseFloat(displayStr.replace(/,/g, ""));
        return Number.isFinite(v) ? v : 0;
      }

      function updateExpr() {
        if (stored !== null && pendingOp) {
          exprEl.textContent = `${formatNum(stored)} ${opSymbols[pendingOp] || pendingOp}`;
        } else {
          exprEl.textContent = "";
        }
      }

      function render() {
        display.textContent = displayStr;
        updateExpr();
      }

      function applyOp(a, op, b) {
        switch (op) {
          case "+":
            return a + b;
          case "-":
            return a - b;
          case "*":
            return a * b;
          case "/":
            return b === 0 ? NaN : a / b;
          default:
            return b;
        }
      }

      function ensureClearError() {
        if (displayStr === "오류") clearAll();
      }

      function inputDigit(d) {
        ensureClearError();
        if (fresh) {
          displayStr = d === "0" ? "0" : d;
          fresh = false;
        } else {
          if (displayStr === "0" && d !== ".") displayStr = d;
          else if (displayStr.replace(".", "").length < 14) displayStr += d;
        }
        render();
      }

      function inputDot() {
        ensureClearError();
        if (fresh) {
          displayStr = "0.";
          fresh = false;
        } else if (!displayStr.includes(".")) {
          displayStr += ".";
        }
        render();
      }

      function setOp(op) {
        if (displayStr === "오류") {
          clearAll();
          return;
        }
        const current = parseDisplay();
        if (stored !== null && pendingOp && !fresh) {
          const result = applyOp(stored, pendingOp, current);
          displayStr = formatNum(result);
          stored = Number.isFinite(result) ? result : null;
        } else {
          stored = current;
        }
        pendingOp = op;
        fresh = true;
        if (!Number.isFinite(parseDisplay())) displayStr = "오류";
        render();
      }

      function equals() {
        if (displayStr === "오류") return;
        if (stored === null || !pendingOp) return;
        const current = parseDisplay();
        const result = applyOp(stored, pendingOp, current);
        displayStr = formatNum(result);
        exprEl.textContent = `${formatNum(stored)} ${opSymbols[pendingOp]} ${formatNum(current)} =`;
        stored = null;
        pendingOp = null;
        fresh = true;
        render();
      }

      function clearAll() {
        displayStr = "0";
        stored = null;
        pendingOp = null;
        fresh = true;
        render();
      }

      function toggleSign() {
        if (displayStr === "오류") return clearAll();
        const n = parseDisplay();
        displayStr = formatNum(-n);
        fresh = false;
        render();
      }

      function percent() {
        if (displayStr === "오류") return;
        const n = parseDisplay();
        displayStr = formatNum(n / 100);
        fresh = false;
        render();
      }

      function backspace() {
        if (fresh || displayStr === "오류") return;
        if (displayStr.length <= 1) displayStr = "0";
        else displayStr = displayStr.slice(0, -1);
        render();
      }

      document.querySelector(".calc").addEventListener("click", function (e) {
        const btn = e.target.closest("button");
        if (!btn) return;
        const d = btn.getAttribute("data-digit");
        const op = btn.getAttribute("data-op");
        const act = btn.getAttribute("data-action");
        if (d !== null) inputDigit(d);
        else if (op) setOp(op);
        else if (act === "dot") inputDot();
        else if (act === "equals") equals();
        else if (act === "clear") clearAll();
        else if (act === "sign") toggleSign();
        else if (act === "percent") percent();
      });

      window.addEventListener("keydown", function (e) {
        if (e.key >= "0" && e.key <= "9") {
          e.preventDefault();
          inputDigit(e.key);
        } else if (e.key === ".") {
          e.preventDefault();
          inputDot();
        } else if (e.key === "+" || e.key === "-") {
          e.preventDefault();
          setOp(e.key);
        } else if (e.key === "*") {
          e.preventDefault();
          setOp("*");
        } else if (e.key === "/") {
          e.preventDefault();
          setOp("/");
        } else if (e.key === "Enter" || e.key === "=") {
          e.preventDefault();
          equals();
        } else if (e.key === "Escape") {
          e.preventDefault();
          clearAll();
        } else if (e.key === "Backspace") {
          e.preventDefault();
          backspace();
        }
      });

      render();
    })();
  </script>
</body>
</html>
